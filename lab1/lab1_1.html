<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пенсионный калькулятор</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"], textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .radio-group {
            display: flex;
            gap: 15px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
    </style>
</head>
<body>
    <h1>Пенсионный калькулятор</h1>
    
    <form id="pensionForm">
        <div class="form-group">
            <label for="age">Возраст:</label>
            <input type="number" id="age" name="age" min="0" required>
        </div>
        
        <div class="form-group">
            <label>Пол:</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="gender" value="male" required> Мужчина
                </label>
                <label>
                    <input type="radio" name="gender" value="female" required> Женщина
                </label>
            </div>
        </div>
        
        <div class="form-group">
            <button type="submit">Рассчитать</button>
        </div>
        
        <div class="form-group">
            <label for="result">Результат:</label>
            <textarea id="result" readonly></textarea>
        </div>
    </form>

    <script>
        document.getElementById('pensionForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Получаем значения из формы
            const age = parseInt(document.getElementById('age').value);
            const gender = document.querySelector('input[name="gender"]:checked').value;
            const resultArea = document.getElementById('result');
            
            let message = '';
            
            // Проверяем условия и формируем сообщение
            if (age >= 0 && age <= 17) {
                message = 'Вам работать ещё рано — учитесь';
            } else if (
                (gender === 'male' && age >= 18 && age <= 59) ||
                (gender === 'female' && age >= 18 && age <= 54)
            ) {
                message = 'Вам ещё работать и работать';
            } else if (
                (gender === 'male' && age >= 60 && age <= 64) ||
                (gender === 'female' && age >= 55 && age <= 59)
            ) {
                message = 'Скоро пенсия!';
            } else if (
                (gender === 'male' && age >= 65) ||
                (gender === 'female' && age >= 60)
            ) {
                message = 'Вам пора на пенсию';
            } else {
                message = 'Да кто ты такой?';
            }
            
            // Выводим результат в textarea
            resultArea.value = message;
        });
    </script>
</body>
</html>
