<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Ввод числа</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            text-align: center;
        }
        a {
            display: inline-block;
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 16px;
        }
        a:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Ввод числа</h1>
    
    <a href="https://kaka-byaka05.github.io/javascript/index.html" id="getNumberLink">Получить число</a>

    <script>
        'use strict';
        document.getElementById('getNumberLink').addEventListener('click', function(event) {
            function requestNumber() {
                let input;
                let number;
              
                while (true) {
                    input = prompt('Введите число, большее 100:');
                    
                    if (input === null) {
                        return false;
                    }
                    
                    number = Number(input);
                    
                    if (!isNaN(number) && number > 100) {
                        return true;
                    } else {
                        alert('Некорректный ввод! Пожалуйста, введите число, большее 100.');
                    }
                }
            }
            
            const numberEntered = requestNumber();
            
            if (numberEntered) {
                return true;
            } else {
                const userConfirms = confirm('Вы не ввели число больше 100. Всё равно перейти на главную страницу?');
                
                if (userConfirms) {
                    return true;
                } else {
                    event.preventDefault();
                    return false;
                }
            }
        });
    </script>
</body>
</html>
