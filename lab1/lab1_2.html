<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Считать ворон</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="number"] {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Считать ворон</h1>
    
    <form id="crowForm">
        <div class="form-group">
            <label for="num">Количество ворон:</label>
            <input type="number" id="num" name="num" min="0" required>
        </div>
        
        <div class="form-group">
            <button type="submit">Считать</button>
        </div>
    </form>

    <script>
        'use strict';
      
        document.getElementById('crowForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            const num = parseInt(document.getElementById('num').value);
            let ending;
            
            const lastTwoDigits = num % 100;
            if (lastTwoDigits >= 11 && lastTwoDigits <= 14) {
                ending = 'ворон';
            } else {
                const lastDigit = num % 10;
                switch (lastDigit) {
                    case 1:
                        ending = 'ворона';
                        break;
                    case 2:
                    case 3:
                    case 4:
                        ending = 'вороны';
                        break;
                    default:
                        ending = 'ворон';
                }
            }
            
            alert(`На ветке сидит ${num} ${ending}`);
        });
    </script>
</body>
</html>
